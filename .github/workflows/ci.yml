name: 🔄 Continuous Integration

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci
        env:
          # Skip downloading the Electron binary — not needed for lint/typecheck/build
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: 🔍 Lint
        run: npm run lint

      - name: ✅ Type check
        run: npm run typecheck

      - name: 🏗️ Build
        run: npx electron-vite build
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
