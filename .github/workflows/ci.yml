name: Continuous Integration

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: 🎨 Format check
        run: npm run format:check

      - name: 🔍 Lint
        run: npm run lint

      - name: ✅ Type check
        run: npm run typecheck

  build:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            flag: --linux
          - os: windows-latest
            flag: --win
          - os: macos-latest
            flag: --mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build (vite)
        run: npx electron-vite build

      - name: 📦 Package (electron-builder)
        run: npx electron-builder ${{ matrix.flag }} --publish never
        env:
          # Skip macOS code signing in CI — no certificate available
          CSC_IDENTITY_AUTO_DISCOVERY: false
